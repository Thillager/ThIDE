name: Build and Release Desktop Apps

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # 🔹 Linux Dependencies für .deb
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg-dev

      # 🔹 Debug (prüfen ob JDK stimmt)
      - name: Show Java version
        run: java -version

      # 🔹 Build + Fat JAR
      - name: Run TBuild - Build and Export Fat JAR
        run: java -jar TBuild.jar build-export-fat

      # 🔹 Native Installer
      - name: Run TBuild - Create Native Installer (jpackage)
        run: java -jar TBuild.jar jpackage

      # 🔹 Debug Output
      - name: List files
        run: |
          echo "=== ROOT ==="
          ls -R || dir

      # 🔹 Artefakte hochladen
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            dist/**
            Export-Fat.jar
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Show downloaded files
        run: ls -R

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            installer-windows-latest/**/*.exe
            installer-windows-latest/**/*.msi
            installer-ubuntu-latest/**/*.deb
            installer-ubuntu-latest/Export-Fat.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
