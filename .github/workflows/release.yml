name: Build and Release Desktop Apps

on:
  push:
    tags:
      - 'v*' # Trigger bei Tags wie v1.0, v2.1.3 etc.

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Wir nutzen Windows für die EXE und Ubuntu für das DEB-Paket
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install WiX Toolset (Windows only)
        if: runner.os == 'Windows'
        run: dotnet tool install --global wix

      - name: Install fakeroot (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fakeroot

      - name: Run TBuild - Build and Export Fat JAR
        # Nutzt den speziellen CI-Befehl von T-Build
        run: java -jar TBuild.jar build-export-fat

      - name: Run TBuild - Create Native Installer (jpackage)
        # Erstellt EXE auf Windows und DEB auf Linux
        run: java -jar TBuild.jar jpackage

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.deb
            Export-Fat.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            installer-windows-latest/*.exe
            installer-ubuntu-latest/*.deb
            installer-ubuntu-latest/Export-Fat.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
